<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paras Kale — Portfolio</title>
  <meta name="description" content="Paras Kale's interactive portfolio — a digital narrative of growth, projects, and passion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <main class="landing-container">
    <div class="intro">
      <p class="greeting">Hello, I'm</p>
      <h1 class="name">Paras Kale</h1>
      <p class="tagline">Developer · Builder · Problem Solver</p>
    </div>

    <div class="eyes-container" id="eyesContainer">
      <div class="eye" id="eyeLeft">
        <div class="pupil" id="pupilLeft">
          <div class="pupil-inner"></div>
        </div>
      </div>
      <div class="eye" id="eyeRight">
        <div class="pupil" id="pupilRight">
          <div class="pupil-inner"></div>
        </div>
      </div>
    </div>

    <div class="cta-area">
      <p class="cta-hint">Curious? So am I.</p>
      <button class="cta-button" id="ctaBtn">
        <span class="btn-text">Explore My Journey</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </main>

  <script src="js/particles.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
